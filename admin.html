<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SlideCraft | Panel de Control</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="padding-top: 50px;">
  <div class="container">
    <div class="glass-card">
      <h2 style="text-align: left;"><i class="fa-solid fa-list-check"></i> Sugerencias de los alumnos</h2>
      <p style="margin-bottom: 20px; color: var(--text-muted);">Aquí verás todas las ideas que la gente escribe desde otros dispositivos.</p>
      
      <div id="suggestions-list" style="display: flex; flex-direction: column; gap: 15px;">
        <div style="text-align: center; padding: 20px;">Cargando sugerencias...</div>
      </div>
    </div>
    
    <div style="text-align: center; margin-top: 20px;">
      <a href="index.html" class="btn" style="background: rgba(255,255,255,0.05);">← Volver a la Landing</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'TU_URL_DE_SUPABASE'; 
    const SUPABASE_ANON_KEY = 'TU_ANON_KEY_DE_SUPABASE';
    
    async function loadSuggestions() {
      const list = document.getElementById('suggestions-list');
      
      if (SUPABASE_URL === 'TU_URL_DE_SUPABASE') {
        list.innerHTML = '<div style="color:#f87171">Aún no has configurado tus claves de Supabase en este archivo.</div>';
        return;
      }
      
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      
      const { data, error } = await supabase
        .from('mejoras')
        .select('*')
        .order('created_at', { ascending: false });
        
      if (error) {
        list.innerHTML = `<div style="color:#f87171">Error al cargar: ${error.message}</div>`;
        return;
      }
      
      if (data.length === 0) {
        list.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-muted);">No hay sugerencias todavía.</div>';
        return;
      }
      
      list.innerHTML = '';
      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'roadmap-item';
        div.style.textAlign = 'left';
        div.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <strong style="color:var(--primary); font-size:1.1rem;">${item.name}</strong>
            <small style="color:var(--text-muted);">${new Date(item.created_at).toLocaleString()}</small>
          </div>
          <p style="margin-top:10px; color:var(--text);">${item.message}</p>
        `;
        list.appendChild(div);
      });
    }

    document.addEventListener('DOMContentLoaded', loadSuggestions);
  </script>
</body>
</html>
